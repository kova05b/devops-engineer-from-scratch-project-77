---
- name: Prepare servers and deploy dockerized app
  hosts: web
  become: true

  roles:
    - role: datadog.datadog
      tags: [monitoring]
      vars:
        datadog_checks:
          http_check:
            init_config: {}
            instances:
              - name: app-local-health
                url: "http://localhost:80"
                timeout: 5

  tasks:
    - name: Install Docker packages
      ansible.builtin.apt:
        name:
          - docker.io
          - python3-pip
        state: present
        update_cache: true
      tags: [prepare]

    - name: Ensure Docker service is enabled and running
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started
      tags: [prepare]

    - name: Install Docker SDK for Python
      ansible.builtin.pip:
        name: docker
        state: present
      tags: [prepare]

    - name: Stop and disable nginx to free port 80
      ansible.builtin.service:
        name: nginx
        state: stopped
        enabled: false
      failed_when: false
      tags: [deploy]

    - name: Run application container
      community.general.docker_container:
        name: "{{ app_container_name }}"
        image: "{{ app_image }}"
        state: started
        restart_policy: always
        recreate: true
        pull: always
        published_ports:
          - "{{ app_host_port }}:{{ app_container_port }}"
      tags: [deploy]

    - name: Install curl for Upmon heartbeat
      ansible.builtin.apt:
        name: curl
        state: present
        update_cache: true
      tags: [availability]

    - name: Configure Upmon heartbeat cron check
      ansible.builtin.cron:
        name: "project77-upmon-heartbeat"
        minute: "{{ upmon_cron_minute }}"
        user: root
        job: "curl -fsS {{ upmon_monitor_url }} >/dev/null && curl -fsS {{ upmon_check_url }} >/dev/null"
      tags: [availability]
